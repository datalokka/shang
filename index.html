<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page with Image Modal</title>
    <style>
        /* මූලික සැකසුම් (unchanged) */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            color: #555;
            margin-bottom: 20px;
        }

        /* Audio Section (unchanged) */
        .audio-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .audio-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fafafa;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            width: 80%;
        }

        .audio-label {
            font-size: 14px;
            font-weight: bold;
            color: #444;
            margin-bottom: 8px;
        }

        /* Button Section (unchanged verbatim text) */
        .custom-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .custom-btn:hover {
            background-color: #1d4ed8;
        }

        /* Photo Gallery - Modified to stack */
        .photo-gallery {
            display: flex;
            flex-direction: column; /* Stack vertically */
            gap: 15px;
            align-items: center; /* Center horizontally */
        }

        /* Container for each gallery item */
        .gallery-item {
            background-color: #fafafa;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        /* Logo and Text label */
        .gallery-label {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: flex-start;
            margin-bottom: 8px;
        }

        /* Illustrative logo */
        .gallery-logo {
            width: 24px;
            height: 24px;
            background-color: #eee;
            border-radius: 50%;
            border: 2px solid #ccc;
            background-image: radial-gradient(circle, #888 2px, transparent 2px);
            background-size: 8px 8px;
            background-position: center;
        }

        .gallery-text {
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        /* Clickable images */
        .photo-gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
            cursor: pointer; /* Clickable look */
            transition: transform 0.2s;
        }

        .photo-gallery img:hover {
            transform: scale(1.03);
        }

        /* MODAL STYLES (Image Open View) */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000; /* High stack order */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85); /* Dark semi-transparent background */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #modal-img {
            object-fit: contain;
        }

        /* Cancel/Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            user-select: none;
        }

        .close-btn:hover {
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 1. Audio ඇතුලත් කරන කොටස (unchanged) -->
        <h2>Voice Recordings</h2>
        <div class="audio-section">
            <div class="audio-item">
                <span class="audio-label">Voice 1</span>
                <audio controls>
                    <source src="voice1.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="audio-item">
                <span class="audio-label">Voice 2</span>
                <audio controls>
                    <source src="voice2.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="audio-item">
                <span class="audio-label">Voice 3</span>
                <audio controls>
                    <source src="voice3.mp3" type="audio/mpeg">
                </audio>
            </div>
            <div class="audio-item">
                <span class="audio-label">Voice 4</span>
                <audio controls>
                    <source src="voice4.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <!-- 2. Button එක (unchanged verbatim text) -->
        <a href="https://freetimeletter.blogspot.com/2026/06/blog-post.html" class="custom-btn">අහන්න කම්මැලිනම් මෙතනින් ගිහින් කියවන්න</a>

        <!-- 3. Photos ඇතුලත් කරන කොටස - Modified -->
        <h2>Photos</h2>
        <div class="photo-gallery">
            
            <!-- Gallery Item 1 -->
            <div class="gallery-item">
                <div class="gallery-label">
                    <div class="gallery-logo"></div>
                    <span class="gallery-text">Image 1</span>
                </div>
                <img src="u1.png" alt="Photo 1" onclick="openModal(this)">
            </div>
            
            <!-- Gallery Item 2 -->
            <div class="gallery-item">
                <div class="gallery-label">
                    <div class="gallery-logo"></div>
                    <span class="gallery-text">Image 2</span>
                </div>
                <img src="u2.png" alt="Photo 2" onclick="openModal(this)">
            </div>
            
            <!-- Gallery Item 3 -->
            <div class="gallery-item">
                <div class="gallery-label">
                    <div class="gallery-logo"></div>
                    <span class="gallery-text">Image 3</span>
                </div>
                <img src="u3.png" alt="Photo 3" onclick="openModal(this)">
            </div>
            
            <!-- Gallery Item 4 -->
            <div class="gallery-item">
                <div class="gallery-label">
                    <div class="gallery-logo"></div>
                    <span class="gallery-text">Image 4</span>
                </div>
                <img src="u4.png" alt="Photo 4" onclick="openModal(this)">
            </div>

        </div>

    </div>

    <!-- Image Modal (Hidden by default) -->
    <div id="image-modal" class="modal">
        <!-- Close/Cancel button -->
        <span class="close-btn" onclick="closeModal()">×</span>
        <img class="modal-content" id="modal-img">
    </div>

    <!-- JavaScript to handle image viewing -->
    <script>
        function openModal(imgElement) {
            // Get the image source
            var imgSrc = imgElement.src;
            // Get the modal elements
            var modal = document.getElementById("image-modal");
            var modalImg = document.getElementById("modal-img");
            // Set the large image source
            modalImg.src = imgSrc;
            // Display the modal using flex centering
            modal.style.display = "flex";
        }

        function closeModal() {
            // Hide the modal
            document.getElementById("image-modal").style.display = "none";
        }

        // Close if user clicks outside the image
        window.onclick = function(event) {
            var modal = document.getElementById("image-modal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
